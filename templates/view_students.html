<!DOCTYPE html>
<html>
<head>
    <title>View Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='table.css') }}">
</head>
<body>

<div class="container">
    <h1>📋 All Students</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Roll No</th>
            <th>Name</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>{{ student[3] }}</td>
            <td>{{ student[4] }}</td>
            <td>
                <a href="/edit/{{ student[0] }}" class="edit-btn">Edit</a>
                <a href="/delete/{{ student[0] }}" class="delete-btn">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

    <a href="/admin" class="back-btn">⬅ Back to Dashboard</a>
</div>

</body>
</html>
